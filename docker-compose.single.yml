services:
  view0x:
    build:
      context: .
      dockerfile: Dockerfile.single
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-/}
        VITE_APP_TITLE: ${VITE_APP_TITLE:-view0x - Smart Contract Analysis}
        VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION:-Analyze your Solidity smart contracts for vulnerabilities, gas optimizations, and code quality issues}
    container_name: view0x-single
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      POSTGRES_DB: ${POSTGRES_DB:-view0x_db}
      POSTGRES_USER: ${POSTGRES_USER:-view0x_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_secure_password}
      JWT_SECRET: ${JWT_SECRET:-change_this_jwt_secret_to_at_least_32_characters}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-change_this_refresh_secret_to_at_least_32_characters}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      API_VERSION: ${API_VERSION:-v1}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://127.0.0.1}
      SLITHER_TIMEOUT: ${SLITHER_TIMEOUT:-300}
      MAX_CONTRACT_SIZE: ${MAX_CONTRACT_SIZE:-1048576}
      MAX_CONCURRENT_ANALYSES: ${MAX_CONCURRENT_ANALYSES:-3}
      ANALYSIS_ENGINE: ${ANALYSIS_ENGINE:-python}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-3600000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-1000}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-1048576}
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_REQUEST_LOGGING: ${ENABLE_REQUEST_LOGGING:-true}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_POOL_MIN: ${DB_POOL_MIN:-2}
      DB_POOL_ACQUIRE: ${DB_POOL_ACQUIRE:-30000}
      DB_POOL_IDLE: ${DB_POOL_IDLE:-10000}
    volumes:
      - view0x_postgres:/var/lib/postgresql/data
      - view0x_redis:/var/lib/redis
      - view0x_uploads:/app/backend/uploads
      - view0x_logs:/app/backend/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  view0x_postgres:
  view0x_redis:
  view0x_uploads:
  view0x_logs:
