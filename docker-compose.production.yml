version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: view0x-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-view0x_db}
      POSTGRES_USER: ${POSTGRES_USER:-view0x_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-view0x_user} -d ${POSTGRES_DB:-view0x_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: view0x-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: ./backend
    container_name: view0x-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-4000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PYTHON_API_URL: ${PYTHON_API_URL:-http://python-worker:8000}
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-4000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build: ./frontend
    container_name: view0x-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000/api}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:4000}
      VITE_APP_TITLE: ${VITE_APP_TITLE:-view0x - Smart Contract Analysis}
      VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION:-Analyze your Solidity smart contracts for vulnerabilities, gas optimizations, and code quality issues}

  # Python Worker (optional)
  python-worker:
    build: ./python
    container_name: view0x-python-worker
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHON_API_PORT: ${PYTHON_API_PORT:-8000}
      SLITHER_TIMEOUT: ${SLITHER_TIMEOUT:-300}
    volumes:
      - python_contracts:/app/contracts
      - python_results:/app/results

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
  backend_logs:
  python_contracts:
  python_results: