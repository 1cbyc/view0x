name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Requires repository secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY
    # On the VPS, set SWAGGER_DOCS_USER and SWAGGER_DOCS_PASSWORD in /home/view0x/app/.env
    # so https://api.view0x.com/docs is reachable (HTTP Basic Auth). If unset in production, /docs returns 404.
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Install SSH tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y rsync openssh-client

      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/view0x_deploy_key
          chmod 600 ~/.ssh/view0x_deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Sync project files to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/view0x_deploy_key" \
            --exclude ".git/" \
            --exclude ".env" \
            --exclude "node_modules/" \
            --exclude "backend/node_modules/" \
            --exclude "frontend/node_modules/" \
            --exclude "backend/dist/" \
            --exclude "frontend/dist/" \
            --exclude "playwright-report/" \
            --exclude "test-results/" \
            ./ "$VPS_USER@$VPS_HOST:/home/view0x/app/"

      - name: Rebuild and restart Docker stack
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          # Base64 of former scripts/ensure-vps-edge.sh (wired Caddy routes on Koreshield edge).
          VIEW0X_EDGE_SCRIPT_B64: 
        run: |
          ssh -i ~/.ssh/view0x_deploy_key "$VPS_USER@$VPS_HOST" <<REMOTE
            set -euo pipefail
            cd /home/view0x/app
            test -f .env
            export WEB_PORT API_PORT
            WEB_PORT="\$(grep -E '^WEB_PORT=' .env | cut -d= -f2- | tr -d '\r' || echo 18088)"
            API_PORT="\$(grep -E '^API_PORT=' .env | cut -d= -f2- | tr -d '\r' || echo 18091)"
            docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --build
            EDGE_B64=$VIEW0X_EDGE_SCRIPT_B64
            printf '%s' "\$EDGE_B64" | base64 -d | \
              EDGE_CONTAINER=koreshield-caddy \
              VIEW0X_NETWORK=view0x_default \
              VIEW0X_WEB_UPSTREAM="172.17.0.1:\${WEB_PORT}" \
              VIEW0X_API_UPSTREAM="view0x-api-1:3001" \
              sh -
            docker compose -f docker-compose.yml -f docker-compose.vps.yml ps
            curl -fsS "http://127.0.0.1:\${WEB_PORT}/health"
            curl -fsS "http://127.0.0.1:\${API_PORT}/health"
            curl -fsS "https://api.view0x.com/health"
          REMOTE
